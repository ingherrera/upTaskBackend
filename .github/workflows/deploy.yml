name: 🚀 Deploy to VPS (Self-Hosted)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🛠 Build y Configuración
        # Aquí ejecutamos todo directamente en el shell de tu Debian 13
        run: |
          # 1. Ir a la carpeta del proyecto (donde el runner descarga el código)
          # El runner por defecto te pone en la raíz del repo, pero si tu app 
          # está en /var/www/, asegúrate de que el runner tenga permisos ahí.

          # 2. Crear archivo .env usando los Secrets de GitHub
          echo "PORT=${{ vars.APP_PORT }}" > .env
          echo "DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"" >> .env
          echo "FRONTEND_URL=\"${{ vars.FRONTEND_URL }}\"" >> .env
          echo "JWT_SECRET=\"${{ secrets.JWT_SECRET }}\"" >> .env

          # 3. Instalación, Build y Base de Datos
          npm install
          npm run build

          # Generar cliente de Prisma (si es necesario) y ejecutar migraciones
          npx prisma generate
          npx prisma migrate deploy

          # 4. Reiniciar con PM2
          # Si usas ecosystem.config.js:
          pm2 reload ecosystem.config.js --update-env || pm2 start ecosystem.config.js
