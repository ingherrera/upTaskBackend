name: CI

on: [push]

jobs:
    build:
        runs-on: self-hosted
        steps:
            - uses: actions/checkout@v3
            - name: Instalar dependencias
              run: npm ci
            - name: Build del proyecto
              run: npm run build
            - name: Reiniciar servidor
              run: |
                  ln -sfn /var/www/upTaskBackend/actions-runner/_work/upTaskBackend/upTaskBackend/dist /var/www/upTaskBackend/current
                  pm2 reload ecosystem.config.js
