- name: Aprovisionamiento Inicial del Servidor UpTask (Debian 13)
  hosts: vps_ubuntu
  become: yes

  vars:
    # Define aquí tus variables para facilitar cambios futuros
    usuario_dev: "cloud"
    db_name: "uptask"
    db_user: "uptask-user"
    db_password: "Pascu71"
    static_ip: "192.168.122.160"
    gateway: "192.168.122.1"

  tasks:
    # --- SISTEMA BASE ---
    - name: Actualizar caché de apt e instalar paquetes base
      apt:
        name:
          - openssh-server
          - sudo
          - curl
          - build-essential
          - ufw
          - python3-pymysql # Necesario para que Ansible gestione MariaDB
        state: present
        update_cache: yes

    - name: Habilitar y arrancar SSH
      systemctl:
        name: ssh
        enabled: yes
        state: started

    - name: Crear usuario de desarrollo
      user:
        name: "{{ usuario_dev }}"
        shell: /bin/bash
        groups: sudo
        append: yes

    # --- CONFIGURACIÓN DE RED (IP ESTÁTICA) ---
    - name: Configurar IP estática en interfaces
      blockinfile:
        path: /etc/network/interfaces
        block: |
          allow-hotplug enp1s0
          iface enp1s0 inet static
              address {{ static_ip }}
              netmask 255.255.255.0
              gateway {{ gateway }}
      notify: Reiniciar red

    # --- NODE.JS ---
    - name: Instalar repositorio de NodeSource (Node 20)
      shell: curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Instalar Node.js
      apt:
        name: nodejs
        state: present

    # --- MARIADB ---
    - name: Instalar MariaDB Server
      apt:
        name: mariadb-server
        state: present

    - name: Iniciar MariaDB
      systemctl:
        name: mariadb
        state: started
        enabled: yes

    - name: Crear base de datos para la app
      mysql_db:
        name: "{{ db_name }}"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    - name: Crear usuario de la base de datos
      mysql_user:
        name: "{{ db_user }}"
        password: "{{ db_password }}"
        priv: "{{ db_name }}.*:ALL"
        state: present
        login_unix_socket: /var/run/mysqld/mysqld.sock

    # --- NGINX ---
    - name: Instalar Nginx #YA
      apt:
        name: nginx
        state: present

    - name: Eliminar sitio por defecto de Nginx
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent
      notify: Reiniciar nginx

    - name: Configurar Proxy Inverso para UpTask
      template:
        src: templates/uptask_nginx.j2 # Debes crear este archivo template
        dest: /etc/nginx/sites-available/uptask
      notify: Reiniciar nginx

    - name: Activar configuración de UpTask
      file:
        src: /etc/nginx/sites-available/uptask
        dest: /etc/nginx/sites-enabled/uptask
        state: link

    # --- FIREWALL (UFW) ---
    - name: Configurar reglas de Firewall
      ufw:
        rule: allow
        name: "{{ item }}"
      loop:
        - OpenSSH
        - "80/tcp"

    - name: Habilitar UFW
      ufw:
        state: enabled
        policy: deny

    # --- PM2 ---
    - name: Instalar PM2 globalmente
      npm:
        name: pm2
        global: yes

  handlers:
    - name: Reiniciar red
      systemctl:
        name: networking
        state: restarted

    - name: Reiniciar nginx
      systemctl:
        name: nginx
        state: restarted
