---
- name: Aprovisionamiento de Software Base y Runner (Debian 13)
  hosts: vps_ubuntu
  become: yes

  tasks:
    - name: 0. VALIDACIÓN - Comprobar consistencia de IP
      ansible.builtin.assert:
        that:
          - static_ip == inventory_hostname
        fail_msg: "¡ERROR DE SEGURIDAD! La IP en all.yml ({{ static_ip }}) no coincide con el servidor del inventario ({{ inventory_hostname }}). Por favor, actualiza 'ansible/group_vars/all.yml' antes de continuar."

    - name: 1. Actualizar índices de paquetes
      ansible.builtin.apt:
        update_cache: yes
        upgrade: safe # Esto instala las actualizaciones pendientes

    - name: 2. Instalar herramientas de sistema y compilación
      ansible.builtin.apt:
        name:
          - openssh-server
          - curl
          - git
          - sudo
          - build-essential
          - ufw
          - python3-pymysql
          - jq
        state: present

    - name: 3. Habilitar y arrancar SSH
      ansible.builtin.service:
        name: ssh
        enabled: yes
        state: started

    - name: 4. Configurar IP estática con Netplan
      ansible.builtin.copy:
        dest: /etc/netplan/01-netcfg.yaml
        content: |
          network:
            version: 2
            renderer: networkd
            ethernets:
              enp1s0:
                dhcp4: no
                addresses:
                  - "{{ static_ip }}/24"
                routes:
                  - to: default
                    via: "{{ gateway }}"
                nameservers:
                  addresses: [8.8.8.8, 1.1.1.1]
      notify: Reiniciar red

    - name: 5. Eliminar configuración de red de cloud-init (Evita IP duplicadas)
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/netplan/50-cloud-init.yaml
        - /etc/netplan/00-installer-config.yaml
      notify: Reiniciar red

    - name: 6. Instalar motor de Node.js 20
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
        apt-get install -y nodejs
      args:
        creates: /usr/bin/node

    - name: 7. Instalar MariaDB Server y Nginx
      ansible.builtin.apt:
        name:
          - mariadb-server
          - nginx
        state: present

    - name: 8. Instalar PM2 Globalmente
      community.general.npm:
        name: pm2
        global: yes

    - name: 9. Preparar directorio del GitHub Runner
      ansible.builtin.file:
        path: "/home/{{ usuario_dev }}/actions-runner"
        state: directory
        owner: "{{ usuario_dev }}"
        group: "{{ usuario_dev }}"
        mode: "0755"

    - name: 10. Descargar y descomprimir el Runner
      ansible.builtin.unarchive:
        src: "https://github.com/actions/runner/releases/download/v{{ runner_version }}/actions-runner-linux-x64-{{ runner_version }}.tar.gz"
        dest: "/home/{{ usuario_dev }}/actions-runner"
        remote_src: yes
        owner: "{{ usuario_dev }}"
        creates: "/home/{{ usuario_dev }}/actions-runner/config.sh"

  handlers:
    - name: Reiniciar red
      ansible.builtin.shell: netplan apply
      become: yes

    - name: Reiniciar nginx
      ansible.builtin.service:
        name: nginx
        state: restarted
      become: yes
